<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi 3: Faraday's Voltage Catcher</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Konfigurasi MathJax
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']], // $...$ atau \(...\)
                displayMath: [['$$', '$$'], ['\\[', '\\]']], // $$...$$ atau \[...\]
                tags: 'ams' // Penomoran persamaan otomatis
            },
            svg: {
                fontCache: 'global'
            },
            loader: {
                load: ['[tex]/ams'] // Memuat ekstensi AMS untuk math
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
</head>
<body>
    <script type="module">
        import { renderNavbar, requirePlayerName, db, ref, push, serverTimestamp } from './app.js';
        renderNavbar();

        let chart, totalScore = 0, ticks = 0;

        requirePlayerName((name) => {
            document.getElementById('game-content').style.display = 'block';
            window.playerName = name;
            initChart();
            setInterval(updateSimulation, 200);
        });

        function initChart() {
            const ctx = document.getElementById('oscilloChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(30).fill(''),
                    datasets: [
                        { label: 'Sinyal Elektroda (mV)', borderColor: '#00e676', data: Array(30).fill(0), tension: 0.4 },
                        { label: 'Target (10 mV)', borderColor: '#ff1744', borderDash: [5, 5], data: Array(30).fill(10) }
                    ]
                },
                options: { animation: false, scales: { y: { min: 0, max: 20 } } }
            });
        }

        function updateSimulation() {
            const B = parseFloat(document.getElementById('slide-b').value);
            const E = B * 1.5 * 5; // Rumus asli: E = Bvd
            
            chart.data.datasets[0].data.push(E);
            chart.data.datasets[0].data.shift();
            chart.update();

            const accuracy = Math.max(0, 100 - Math.abs(E - 10) * 10);
            totalScore += accuracy;
            ticks++;
            document.getElementById('accuracy-display').innerText = `Akurasi: ${Math.round(totalScore/ticks)}%`;
            document.getElementById('val-b').innerText = B.toFixed(2);
        }

        window.submitSesi3 = async () => {
            await push(ref(db, 'leaderboard_sesi3'), {
                name: window.playerName,
                score: Math.round(totalScore/ticks),
                timestamp: serverTimestamp()
            });
            location.href = 'leaderboard.html';
        };
    </script>

    <div id="game-content" class="container" style="display:none; margin-top:80px;">
        <h2 style="color:var(--primary-color)">Sesi 3: Faraday's Voltage Catcher</h2>
        <div style="background:#000; padding:15px; border-radius:12px; border:2px solid #333;">
            <canvas id="oscilloChart" height="120"></canvas>
        </div>
        <div style="text-align:center; margin:15px 0; font-weight:bold; font-size:1.2rem;" id="accuracy-display">Akurasi: 0%</div>
        <div class="controls" style="background:var(--surface-color); padding:20px; border-radius:12px;">
            <p>Kuat Medan Magnet ($B$): <span id="val-b" style="color:var(--secondary-color)">0.00</span> Tesla</p>
            <input type="range" id="slide-b" min="0.00" max="5" step="0.05" value="0.00" style="width:100%; accent-color:var(--secondary-color);">
            <button class="btn-primary" onclick="submitSesi3()" style="width:100%; margin-top:20px;">Kunci Sinyal</button>
        </div>
    </div>
</body>
</html>

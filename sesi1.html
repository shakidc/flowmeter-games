<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi 1: Reynolds Tuner</title>
    <link rel="stylesheet" href="global.css">
    <script>
        // Konfigurasi MathJax
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']], // $...$ atau \(...\)
                displayMath: [['$$', '$$'], ['\\[', '\\]']], // $$...$$ atau \[...\]
                tags: 'ams' // Penomoran persamaan otomatis
            },
            svg: {
                fontCache: 'global'
            },
            loader: {
                load: ['[tex]/ams'] // Memuat ekstensi AMS untuk math
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
</head>
<body>
    <script type="module">
        import { renderNavbar, requirePlayerName, db, ref, push, serverTimestamp } from './app.js';
        renderNavbar();

        // --- ORIGINAL GAME LOGIC ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        requirePlayerName((playerName) => {
            document.getElementById('game-content').style.display = 'block';
            window.currentPlayer = playerName;
            initSimulation();
        });

        function initSimulation() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 2 + 1
                });
            }
            animate();
        }

        function animate() {
            ctx.fillStyle = 'rgba(18, 18, 20, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const v = parseFloat(document.getElementById('slide-velocity').value);
            const d = parseInt(document.getElementById('slide-diameter').value);
            const re = Math.round(v * d * 1000);
            
            document.getElementById('val-re').innerText = re;
            let statusText = "Laminar";
            let jitter = 0;
            let color = "#00e676";

            if(re > 2300 && re <= 4000) {
                statusText = "Transisi";
                jitter = 1.5;
                color = "#ffb300";
            } else if (re > 4000) {
                statusText = "Turbulen";
                jitter = 5; 
                color = "#ff1744";
            }

            document.getElementById('status-re').innerText = statusText;
            document.getElementById('status-re').style.color = color;
            
            particles.forEach(p => {
                let jitter = re > 4000 ? (Math.random() - 0.5) * (re / 800) : 0;
                p.x += p.speed * v;
                p.y += jitter;

                if(p.x > canvas.width) p.x = 0;
                if(p.y > canvas.height) p.y = 0;
                if(p.y < 0) p.y = canvas.height;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = "#00b0ff";
                ctx.fill();
            });
            animationId = requestAnimationFrame(animate);
        }

        window.updateLabels = () => {
            document.getElementById('val-velocity').innerText = parseFloat(document.getElementById('slide-velocity').value).toFixed(2);
            document.getElementById('val-diameter').innerText = parseFloat(document.getElementById('slide-diameter').value).toFixed(0);
        };

        window.submitScore = async () => {
            const v = parseFloat(document.getElementById('slide-velocity').value);
            const d = parseInt(document.getElementById('slide-diameter').value);
            const re = Math.round(v * d * 1000);
            let score = re > 4000 ? Math.max(10, Math.round(100 - (Math.abs(5000 - re) / 200))) : Math.round((re / 4000) * 50);

            await push(ref(db, 'leaderboard_sesi1'), {
                name: window.currentPlayer,
                score: score,
                re: re,
                timestamp: serverTimestamp()
            });
            location.href = 'leaderboard.html';
        };
    </script>

    <div id="game-content" class="container" style="display:none; margin-top:80px;">
        <h2>Sesi 1: The Reynolds Tuner</h2>
        <div style="background:#000; height:250px; border-radius:8px; margin-bottom:20px; position:relative;">
            <canvas id="simCanvas" style="width:100%; height:100%;"></canvas>
            <div style="position:absolute; top:10px; right:20px; text-align:right;">
                <div id="val-re" style="font-size:2rem; font-weight:bold; color:var(--primary-color);">0</div>
                <div id="status-re" style="font-weight:bold;">LAMINER</div>
            </div>
        </div>
        <div class="controls" style="background:var(--surface-color); padding:20px; border-radius:8px;">
            <p>Kecepatan Fluida ($v$): <span id="val-velocity">0.01</span> m/s</p>
            <input type="range" id="slide-velocity" min="0.01" max="10" step="0.01" value="0.01" oninput="updateLabels()" style="width:100%;">
            <p style="margin-top:15px;">Diameter Dalam Pipa ($D$): <span id="val-diameter">10</span> mm</p>
            <input type="range" id="slide-diameter" min="10" max="500" step="10" value="10" oninput="updateLabels()" style="width:100%;">
            <button class="btn-primary" onclick="submitScore()" style="width:100%; margin-top:20px;">Kunci & Submit</button>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboard</title>
    <link rel="stylesheet" href="global.css">
    
    <style>
        .board-container { width: 100%; max-width: 900px; padding: 20px; box-sizing: border-box; }
        .header-section { text-align: center; margin: 30px 0; }
        .header-section h2 { color: var(--primary); text-transform: uppercase; margin: 0; font-size: 1.8rem; }
        
        .session-nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .btn-sesi { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-sesi.active, .btn-sesi:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .table-wrapper { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1a1a20; color: var(--text-muted); padding: 15px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        
        .rank { display: inline-block; width: 30px; height: 30px; line-height: 30px; text-align: center; background: #2a2a35; border-radius: 50%; font-weight: bold; }
        tr:nth-child(1) .rank { background: #ffd700; color: #000; } /* Emas */
        tr:nth-child(2) .rank { background: #c0c0c0; color: #000; } /* Perak */
        tr:nth-child(3) .rank { background: #cd7f32; color: #000; } /* Perunggu */
        
        .score { color: var(--success); font-weight: bold; text-align: right; }
        .status-bar { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 15px; }
    </style>
</head>
<body>

    <script type="module">
        import { renderNavbar, db, ref, onValue } from './app.js';
        
        renderNavbar('leaderboard');

        let currentSession = 'leaderboard_sesi1';
        let unsubscribe = null;

        const sessionTitles = {
            'leaderboard_sesi1': "The Reynolds Tuner",
            'leaderboard_sesi2': "The Meter Matcher",
            'leaderboard_sesi3': "Faraday's Voltage Catcher",
            'leaderboard_sesi4': "The Instrument Inspector"
        };

        function escapeHTML(str) { return str ? str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)) : ""; }

        window.switchSession = (session) => {
            currentSession = session;
            document.getElementById('board-title').innerText = `TOP 10: ${sessionTitles[session]}`;
            
            // Update tombol active
            document.querySelectorAll('.btn-sesi').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${session}`).classList.add('active');

            loadData();
        };

        function loadData() {
            if (unsubscribe) unsubscribe(); // Hentikan listener sesi sebelumnya
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;">Memuat data real-time...</td></tr>`;

            unsubscribe = onValue(ref(db, currentSession), (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">Belum ada praktisi yang tercatat di sesi ini.</td></tr>`;
                    document.getElementById('live-status').innerText = `Peserta: 0`;
                    return;
                }

                const players = Object.values(data);
                // Sortir skor tertinggi, waktu tercepat
                players.sort((a, b) => b.score - a.score || a.timestamp - b.timestamp);
                
                tbody.innerHTML = "";
                players.slice(0, 10).forEach((p, index) => {
                    // Tambahan info tergantung sesi (misal: Sesi 4 punya temuan)
                    let extra = "";
                    if(p.time) extra = ` <span style="color:#888; font-size:0.8rem;">(${p.time}s)</span>`;
                    if(p.findings !== undefined) extra = ` <span style="color:#888; font-size:0.8rem;">(${p.findings} Anomali)</span>`;

                    tbody.innerHTML += `
                        <tr>
                            <td style="width: 10%;"><span class="rank">${index + 1}</span></td>
                            <td><strong>${escapeHTML(p.name)}</strong>${extra}</td>
                            <td class="score">${p.score} Pts</td>
                        </tr>
                    `;
                });
                document.getElementById('live-status').innerText = `Peserta Terdaftar: ${players.length} | Real-Time Sync Active`;
            });
        }

        // Panggil saat load pertama kali
        window.switchSession('leaderboard_sesi1');
    </script>

    <div class="board-container">
        <div class="header-section">
            <h2 id="board-title">TOP 10: The Reynolds Tuner</h2>
        </div>

        <div class="session-nav">
            <button id="btn-leaderboard_sesi1" class="btn-sesi" onclick="switchSession('leaderboard_sesi1')">Sesi 1</button>
            <button id="btn-leaderboard_sesi2" class="btn-sesi" onclick="switchSession('leaderboard_sesi2')">Sesi 2</button>
            <button id="btn-leaderboard_sesi3" class="btn-sesi" onclick="switchSession('leaderboard_sesi3')">Sesi 3</button>
            <button id="btn-leaderboard_sesi4" class="btn-sesi" onclick="switchSession('leaderboard_sesi4')">Sesi 4</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Posisi</th>
                        <th>Nama / Instansi</th>
                        <th style="text-align: right;">Skor</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
        <div class="status-bar" id="live-status">Menghubungkan ke server...</div>
    </div>

</body>
</html>
